<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucid Commander - Knowledge Graph Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Start View - Google-like minimal interface -->
    <div id="start-view" class="start-view">
        <div class="start-container">
            <!-- Phase hamburger for docked state -->
            <div class="phase-hamburger docked-hamburger" style="display: none;">
                <button id="docked-phase-menu-toggle" class="hamburger-btn" aria-label="Toggle phase menu">
                    <div class="hamburger-icon">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <div class="current-phase">Discover</div>
                </button>
            </div>

            <div class="start-logo">
                <h1>Lucid Dream</h1>
                <p>Wake. Know. Ship.</p>
                <span class="project-name" id="project-name"></span>
            </div>
            <div class="start-input-group">
                <div class="start-input-row">
                    <input type="text" id="start-ai-prompt" class="start-input" placeholder="Describe your vision..." autofocus />
                    <button id="start-submit" class="start-submit" aria-label="Start">→</button>
                </div>
                <div class="start-separator">— or —</div>
                <select id="start-graph-selector" class="start-graph-selector">
                    <option value="">Select a graph to load...</option>
                    <option value="spec-graph.json">spec-graph.json</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Discover View - Main application interface -->
    <div id="discover-view" class="discover-view hidden">
    <!-- AI Prompt Bar -->
    <header id="ai-prompt-bar">
        <!-- Phase Navigation Hamburger - Left Side -->
        <div class="phase-hamburger">
            <button id="phase-menu-toggle" class="hamburger-btn" aria-label="Toggle phase menu">
                <div class="hamburger-icon">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div class="current-phase" id="current-phase-indicator">Discover</div>
            </button>

        </div>

        <div class="prompt-container">
            <div class="prompt-input-wrapper">
                <input type="text" id="ai-prompt" placeholder="What is your dream about?" />
                <textarea id="ai-prompt-multiline" class="hidden" placeholder="What is your dream about?" rows="4"></textarea>
                <button id="ai-upload" class="floating-prompt-btn" aria-label="Upload" title="Uploads soon">
                    <span class="icon-circle">↑</span>
                </button>
                <button id="ai-expand" class="floating-prompt-btn" aria-label="Expand" title="Expand to multiline">
                    <span class="icon-circle">⋯</span>
                </button>
            </div>
            <button id="ai-submit" aria-label="Send to AI">→</button>
        </div>
    </header>

    <div id="main-container">

        <!-- Left Phase Sidebar (inside main container) -->
        <nav id="phase-sidebar-inner" class="phase-sidebar-inner hidden">
            <div class="sidebar-content">
                <button class="phase-btn" data-phase="start">Start</button>
                <button class="phase-btn active" data-phase="discover">Discover</button>
                <button class="phase-btn" data-phase="validation" disabled>Validation</button>
                <button class="phase-btn" data-phase="define">Define</button>
                <button class="phase-btn" data-phase="deliver" disabled>Deliver</button>
                <button class="phase-btn" data-phase="phases">Phases</button>

            </div>
        </nav>

        <!-- Main Content Area -->
        <main id="phase-content">
            <!-- Dynamic content loaded here -->
        </main>

        <!-- Right Sidebar - Entity Browser -->
        <aside id="entity-sidebar" class="entity-sidebar">
            <!-- Collapse Toggle Button -->
            <button id="entity-sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
                <span class="toggle-icon">◀</span>
            </button>

            <!-- Graph Management Section -->
            <section id="sidebar-graph-manager">
                <div class="app-title" style="display: flex; align-items: center; justify-content: space-between;">
                    <div>
                        <h3>Lucid Dream</h3>
                        <p>Live. Know. Ship.</p>
                    </div>
                    <!-- Mini Progress Vessel -->
                    <div id="mini-vessel-container">
                        <canvas id="mini-vessel-canvas" width="100" height="40"></canvas>
                    </div>
                </div>
                <div class="graph-manager">
                    <select id="graph-selector">
                        <option value="current">spec-graph.json</option>
                    </select>
                    <div class="graph-controls">
                        <button id="graph-new" title="New Graph">+</button>
                        <button id="graph-save" title="Save Graph">✓</button>
                        <button id="graph-restore" title="Restore Graph">✕</button>
                    </div>
                </div>
            </section>

            <div id="entity-accordion">
                <!-- Dynamically populated -->
            </div>

        </aside>
    </div>

    <!-- Entity Review Modal (hidden by default) -->
    <div id="entity-review-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Review Extracted Entities</h2>
                <button class="close-modal" aria-label="Close">&times;</button>
            </div>
            <div class="modal-body" id="entity-review-content">
                <!-- Populated dynamically -->
            </div>
            <div class="modal-footer">
                <button id="accept-entities">Accept Selected</button>
                <button id="edit-entities">Edit More</button>
                <button id="validate-entities">Run Validation</button>
                <button id="cancel-review">Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/minimap.js"></script>
    <script src="js/app.js"></script>
    <script src="js/discover.js"></script>
    <script src="js/graph.js"></script>
    <script src="js/vessel-canvas.js"></script>
    <script src="js/mini-vessel.js"></script>
    </div> <!-- End discover-view -->
</body>
</html>
