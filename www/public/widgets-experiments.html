<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Experiments - Lucid Dream</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background: var(--bg-dark);
            padding: var(--space-large);
        }

        .experiments-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-large);
        }

        .experiment-section {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--circuit-color);
            border-radius: 8px;
            padding: var(--space-large);
        }

        .experiment-title {
            color: var(--secondary-blue);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: var(--space-medium);
            text-shadow: 0 0 10px var(--secondary-blue);
        }

        #sidebar-graph, #progress-vessel {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="experiments-container">
        <!-- Graph Experiment -->
        <div class="experiment-section">
            <h2 class="experiment-title">Knowledge Graph Visualization</h2>

            <!-- Persistent 2D Graph View -->
            <section id="sidebar-graph">
                <header>
                    <h4>Graph Overview</h4>
                    <button id="graph-refresh" aria-label="Refresh graph view">↻</button>
                </header>
                <!-- Graph control sliders -->
                <div id="graph-controls" class="graph-controls-panel">
                    <div class="slider-control">
                        <label>Start Angle: <span id="start-angle-value">0</span>°</label>
                        <input type="range" id="start-angle" min="-180" max="180" value="0" step="5">
                    </div>
                    <div class="slider-control">
                        <label>Spread: <span id="spread-value">252</span>°</label>
                        <input type="range" id="spread" min="30" max="360" value="252" step="10">
                    </div>
                    <div class="slider-control">
                        <label>Layer Gap: <span id="layer-spacing-value">30</span>px</label>
                        <input type="range" id="layer-spacing" min="10" max="50" value="30" step="2">
                    </div>
                    <div class="slider-control">
                        <label>Origin X: <span id="origin-x-value">25</span>px</label>
                        <input type="range" id="origin-x" min="10" max="100" value="25" step="5">
                    </div>
                    <div class="slider-control">
                        <label>Origin Y: <span id="origin-y-value">50</span>%</label>
                        <input type="range" id="origin-y" min="20" max="80" value="50" step="5">
                    </div>
                    <div class="slider-control">
                        <label>Base Radius: <span id="base-radius-value">40</span>px</label>
                        <input type="range" id="base-radius" min="20" max="80" value="40" step="5">
                    </div>
                    <div class="slider-control">
                        <label>Node Size: <span id="node-size-value">3</span>px</label>
                        <input type="range" id="node-size" min="1" max="8" value="3" step="1">
                    </div>
                    <div class="slider-control">
                        <label>V-Jitter: <span id="vertical-jitter-value">4</span>px</label>
                        <input type="range" id="vertical-jitter" min="0" max="10" value="4" step="1">
                    </div>
                    <div class="slider-control">
                        <label>Line Width: <span id="line-width-value">0.8</span></label>
                        <input type="range" id="line-width" min="0.2" max="2" value="0.8" step="0.1">
                    </div>
                    <div class="slider-control">
                        <label>Node Gap: <span id="node-gap-value">1</span></label>
                        <input type="range" id="node-gap" min="0" max="5" value="1" step="0.5">
                    </div>
                    <div class="slider-control">
                        <label>Layer Curve: <span id="layer-curve-value">0</span>°</label>
                        <input type="range" id="layer-curve" min="-30" max="30" value="0" step="5">
                    </div>
                    <div class="slider-control">
                        <label>Glow Size: <span id="glow-size-value">3</span>px</label>
                        <input type="range" id="glow-size" min="0" max="10" value="3" step="1">
                    </div>
                    <div class="slider-control">
                        <label>Line Opacity: <span id="line-opacity-value">30</span>%</label>
                        <input type="range" id="line-opacity" min="10" max="100" value="30" step="10">
                    </div>
                    <div class="slider-control">
                        <label>Spiral: <span id="spiral-value">0</span></label>
                        <input type="range" id="spiral" min="0" max="20" value="0" step="1">
                    </div>
                    <div class="slider-control">
                        <label>Wave Amp: <span id="wave-amp-value">0</span>px</label>
                        <input type="range" id="wave-amp" min="0" max="20" value="0" step="2">
                    </div>
                    <div class="slider-control">
                        <label>Wave Freq: <span id="wave-freq-value">1</span></label>
                        <input type="range" id="wave-freq" min="0.5" max="5" value="1" step="0.5">
                    </div>
                    <div class="config-output">
                        <label>Config (copy to share):</label>
                        <textarea id="config-output" readonly rows="2">-15,80,12,10,20,20</textarea>
                        <button id="copy-config" title="Copy to clipboard">📋</button>
                    </div>
                    <div class="config-input">
                        <label>Load Config:</label>
                        <input type="text" id="config-input" placeholder="Paste config here">
                        <button id="load-config" title="Load configuration">↻</button>
                    </div>
                </div>
                <!-- Fixed node info display panel -->
                <div id="graph-node-info" class="node-info-panel">
                    <div class="info-placeholder">
                        <div class="info-label">GRAPH_OVERVIEW</div>
                        <div class="info-text">Click a node to view details</div>
                    </div>
                </div>
                <canvas id="graph-minimap" width="400" height="300" role="img"
                        aria-label="Interactive knowledge graph overview"></canvas>
            </section>
        </div>

        <!-- Vessel Experiment -->
        <div class="experiment-section">
            <h2 class="experiment-title">Progress Vessel Visualization</h2>

            <!-- Progress Vessel Widget -->
            <section id="progress-vessel">
                <header>
                    <h4>Project Completion</h4>
                    <div class="vessel-mode-selector">
                        <button class="vessel-mode active" data-mode="waves">Waves</button>
                        <button class="vessel-mode" data-mode="orb">Orb</button>
                        <button class="vessel-mode" data-mode="plasma">Plasma</button>
                    </div>
                </header>
                <div id="vessel-container">
                    <div id="vessel"></div>
                    <div id="vessel-stats" style="display: none;">
                        <span id="completion-percent">0%</span>
                    </div>
                </div>

                <!-- Vessel Control Sliders -->
                <div id="vessel-controls" class="vessel-controls-panel">
                    <div class="slider-control">
                        <label>Fill Level: <span id="fill-level-value">10</span>%</label>
                        <input type="range" id="fill-level" min="0" max="100" value="10" step="5">
                    </div>
                    <div class="slider-control">
                        <label>Width: <span id="vessel-width-value">200</span>px</label>
                        <input type="range" id="vessel-width" min="50" max="400" value="200" step="10">
                    </div>
                    <div class="slider-control">
                        <label>Height: <span id="vessel-height-value">100</span>px</label>
                        <input type="range" id="vessel-height" min="50" max="200" value="100" step="10">
                    </div>
                    <div class="slider-control">
                        <label>Wave Speed: <span id="wave-speed-value">12</span>s</label>
                        <input type="range" id="wave-speed" min="2" max="20" value="12" step="1">
                    </div>
                    <div class="slider-control">
                        <label>Wave Height: <span id="wave-height-value">3</span>px</label>
                        <input type="range" id="wave-height" min="0" max="20" value="3" step="1">
                    </div>
                    <div class="slider-control">
                        <label>Turbulence: <span id="turbulence-value">3</span></label>
                        <input type="range" id="turbulence" min="0" max="10" value="3" step="1">
                    </div>
                    <div class="slider-control">
                        <label>Glow Intensity: <span id="glow-intensity-value">50</span>%</label>
                        <input type="range" id="glow-intensity" min="0" max="100" value="50" step="10">
                    </div>
                    <div class="slider-control" style="display: none;">
                        <label>Bubble Count: <span id="bubble-count-value">0</span></label>
                        <input type="range" id="bubble-count" min="0" max="20" value="0" step="1">
                    </div>
                    <div class="slider-control">
                        <label>Refraction: <span id="refraction-value">2</span>px</label>
                        <input type="range" id="refraction" min="0" max="10" value="2" step="1">
                    </div>
                    <div class="slider-control">
                        <label>Viscosity: <span id="viscosity-value">5</span></label>
                        <input type="range" id="viscosity" min="0" max="10" value="5" step="1">
                    </div>
                    <div class="slider-control">
                        <label>Surface Tension: <span id="surface-tension-value">3</span></label>
                        <input type="range" id="surface-tension" min="0" max="10" value="3" step="1">
                    </div>
                    <div class="slider-control">
                        <label>Color Shift: <span id="color-shift-value">0</span>°</label>
                        <input type="range" id="color-shift" min="-180" max="180" value="0" step="10">
                    </div>

                    <!-- Config Output for Vessel -->
                    <div class="config-output vessel-config">
                        <label>Vessel Config:</label>
                        <textarea id="vessel-config-output" readonly rows="3">mod:waves,fil:10,wid:200,hei:100,wav:12,wav:3,tur:3,glo:50,bub:0,ref:2,vis:5,sur:3,col:0</textarea>
                        <button id="copy-vessel-config" title="Copy to clipboard">📋</button>
                    </div>
                    <div class="config-input">
                        <label>Load Vessel Config:</label>
                        <input type="text" id="vessel-config-input" placeholder="Paste config here">
                        <button id="load-vessel-config" title="Load configuration">↻</button>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Mock app object for minimap -->
    <script>
        window.app = {
            graph: {
                entities: {},
                graph: {},
                references: {}
            }
        };
    </script>

    <script src="js/minimap.js"></script>
    <script src="js/vessel-canvas.js"></script>
</body>
</html>
