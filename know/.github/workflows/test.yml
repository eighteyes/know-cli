name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run tests
      run: |
        cd know
        pytest tests/ -v --cov=know_lib --cov-report=xml --cov-report=term

    - name: Upload coverage
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v3
      with:
        file: ./know/coverage.xml
        flags: unittests
        name: codecov-umbrella

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint mypy black

    - name: Check formatting with black
      run: |
        cd know
        black --check know_lib/ tests/

    - name: Lint with pylint
      run: |
        cd know
        pylint know_lib/ --disable=all --enable=E,F
      continue-on-error: true

    - name: Type check with mypy
      run: |
        cd know
        mypy know_lib/ --ignore-missing-imports
      continue-on-error: true

  benchmark:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run benchmarks
      run: |
        cd know
        python benchmark.py

    - name: Check performance regression
      run: |
        cd know
        # Ensure cached operations are under 1ms
        python -c "
        from benchmark import run_benchmarks
        results = run_benchmarks()
        cached_ms = results['load_cached']['avg_ms']
        assert cached_ms < 1.0, f'Cached load too slow: {cached_ms}ms'
        print(f'✓ Performance check passed: {cached_ms}ms')
        "
