                }, []);

                const formatTs = (ts) => {
                    try {
                        const d = new Date(ts);
                        return (
                            d.toLocaleTimeString([], {
                                hour: "2-digit",
                                minute: "2-digit",
                            }) +
                            " · " +
                            d.toLocaleDateString([], {
                                month: "short",
                                day: "numeric",
                            })
                        );
                    } catch {
                        return ts;
                    }
                };

                const summarizeEntry = (e) => {
                    const parts = [];
                    if (e.entities_added?.length)
                        parts.push({
                            text: `+${e.entities_added.length} added`,
                            cls: "added",
                        });
                    if (e.entities_removed?.length)
                        parts.push({
                            text: `-${e.entities_removed.length} removed`,
                            cls: "removed",
                        });
                    if (e.entities_modified?.length)
                        parts.push({
                            text: `~${e.entities_modified.length} modified`,
                            cls: "modified",
                        });
                    if (e.links_added?.length)
                        parts.push({
                            text: `+${e.links_added.length} links`,
                            cls: "added",
                        });
                    if (e.links_removed?.length)
                        parts.push({
                            text: `-${e.links_removed.length} links`,
                            cls: "removed",
                        });
                    if (e.refs_added?.length)
                        parts.push({
                            text: `+${e.refs_added.length} refs`,
                            cls: "added",
                        });
                    if (e.refs_removed?.length)
                        parts.push({
                            text: `-${e.refs_removed.length} refs`,
                            cls: "removed",
                        });
                    return parts;
                };

                const describeEntry = (e) => {
                    const items = [];
                    for (const id of e.entities_added || [])
                        items.push(`+ ${id}`);
                    for (const id of e.entities_removed || [])
                        items.push(`- ${id}`);
                    for (const l of e.links_added || [])
                        items.push(`+ ${l.from} → ${l.to}`);
                    for (const l of e.links_removed || [])
                        items.push(`- ${l.from} → ${l.to}`);
                    return (
                        items.slice(0, 3).join(", ") +
                        (items.length > 3 ? ` +${items.length - 3} more` : "")
                    );
                };

                return html`<div class="history-panel">
                    <div class="history-header">
                        <h3>Change History</h3>
                        <button class="sidecard-close" onClick=${onClose}>
                            ×
                        </button>
                    </div>
                    <div class="history-body">
                        ${!history
                            ? html`<div class="history-empty">Loading…</div>`
                            : null}
                        ${history?.entries?.length === 0
                            ? html`<div class="history-empty">
                                  No changes recorded
                              </div>`
                            : null}
                        ${history?.entries?.map(
                            (e) => html`
                                <div class="history-entry">
                                    <div class="ts">${formatTs(e.ts)}</div>
                                    <div>${describeEntry(e)}</div>
                                    <div class="changes">
                                        ${summarizeEntry(e).map(
                                            (p) =>
                                                html`<span
                                                    class="change-pill ${p.cls}"
                                                    >${p.text}</span
                                                >`,
                                        )}
                                    </div>
                                </div>
                            `,
                        )}
                    </div>
                </div>`;
            }

            // ═══════════════════════════════════════════════════════════
            // App
            // ═══════════════════════════════════════════════════════════

            function App() {
                const [graph, setGraph] = useState(null);
                const [selectedId, setSelectedId] = useState(null);
                const [filterUser, setFilterUser] = useState(null);
                const [filterObjective, setFilterObjective] = useState(null);
                const [toast, setToast] = useState(null);
                const [validationIssues, setValidationIssues] = useState([]);
                const [showBanner, setShowBanner] = useState(true);
                const [modal, setModal] = useState(null);
                const [undoCount, setUndoCount] = useState(0);
                const [showHistory, setShowHistory] = useState(false);
                const [showChat, setShowChat] = useState(false);

                // SSE connection for hot updates when graph changes externally
                useEffect(() => {
                    const es = api.connectEvents(() => {
                        // Graph file changed externally — reload
                        loadGraph();
                    });
                    return () => es.close();
                }, []);

                const loadGraph = useCallback(async () => {
                    try {
                        const data = await api.fetchGraph();
                        setGraph(data);
                        validateGraph(data);
                    } catch (e) {
                        setToast({
                            type: "error",
                            message: `Failed to load: ${e.message}`,
                        });
                    }
                }, []);

                useEffect(() => {
                    loadGraph();
                }, [loadGraph]);

                const validateGraph = (g) => {
                    const issues = [];
                    const allFeatures = Object.keys(
                        g.entities?.feature || {},
                    ).map((k) => `feature:${k}`);
                    for (const fid of allFeatures) {
                        if (getParentsOf(g, fid).length === 0)
                            issues.push(`${fid} has no parent`);
                        if (getDepsOf(g, fid).length === 0)
                            issues.push(`${fid} has no deps`);
                    }
                    for (const [src, entry] of Object.entries(g.graph || {})) {
                        for (const dep of [
                            ...(entry.depends_on || []),
                            ...(entry.depends_on_ordered || []),
                        ]) {
                            const [t, ...r] = dep.split(":");
                            if (
                                !g.entities?.[t]?.[r.join(":")] &&
                                !g.references?.[t]?.[r.join(":")]
                            ) {
                                issues.push(`${src} → ${dep} (missing)`);
                            }
                        }
                    }
                    setValidationIssues(issues);
                };

                const handleMutate = (result, successMsg, errorMsg) => {
                    if (errorMsg) {
                        setToast({ type: "error", message: errorMsg });
                        return;
                    }
                    // result can be a graph object directly or a response with {graph, undo_available}
                    const newGraph = result?.graph || result;
                    if (newGraph?.entities) {
                        setGraph(newGraph);
                        validateGraph(newGraph);
                    }
                    if (result?.undo_available !== undefined)
                        setUndoCount((prev) => prev + 1);
                    if (successMsg)
                        setToast({ type: "success", message: successMsg });
                };

                const handleFilter = (type, value) => {
                    if (type === "user") setFilterUser(value);
                    if (type === "objective") setFilterObjective(value);
                };

                const handleDrop = async (featureId, horizonId) => {
                    try {
                        const result = await api.changeHorizon(
                            featureId,
                            horizonId,
                        );
                        handleMutate(
                            result,
                            `Moved ${entityKey(featureId)} → ${horizonId}`,
                        );
                    } catch (e) {
                        handleMutate(null, null, e.message);
                    }
                };

                const handleUndo = async () => {
                    try {
                        const result = await api.undo();
                        setGraph(result.graph);
                        validateGraph(result.graph);
                        setUndoCount((prev) => Math.max(0, prev - 1));
                        setToast({
                            type: "success",
                            message: `Undone: ${result.undone}`,
                        });
                    } catch (e) {
                        setToast({ type: "error", message: e.message });
                    }
                };

                if (!graph)
                    return html`<div class="loading-screen">
                        <h2>Loading graph</h2>
                        <div class="loading-dots"><span /><span /><span /></div>
                    </div>`;

                const { horizons, assignments } = getHorizonInfo(graph);
                const features = getAllFeatures(graph);

                let visibleFeatures = features;
                if (filterObjective) {
                    const objDeps = getDepsOf(
                        graph,
                        `objective:${filterObjective}`,
                    );
                    visibleFeatures = visibleFeatures.filter((f) =>
                        objDeps.includes(f.id),
                    );
                }
                if (filterUser) {
                    const userFeatures = new Set();
                    for (const obj of getDepsOf(
                        graph,
                        `user:${filterUser}`,
                    ).filter((d) => entityType(d) === "objective"))
                        for (const d of getDepsOf(graph, obj))
                            if (entityType(d) === "feature")
                                userFeatures.add(d);
                    visibleFeatures = visibleFeatures.filter((f) =>
                        userFeatures.has(f.id),
                    );
                }

                // Reverse horizon order: highest roman numeral first, done/unphased at right
                const horizonKeys = Object.keys(horizons);
                const sortedHorizonKeys = [...horizonKeys].sort((a, b) => {
                    // Roman numeral sort: V, IV, III, II, I (descending)
                    const romanVal = {
                        I: 1,
                        II: 2,
                        III: 3,
                        IV: 4,
                        V: 5,
                        VI: 6,
                        VII: 7,
                        VIII: 8,
                        IX: 9,
                        X: 10,
                    };
                    const va = romanVal[a] || 0;
                    const vb = romanVal[b] || 0;
                    return vb - va; // descending
                });
                const columns = sortedHorizonKeys.map((pid) => ({
                    horizon: horizons[pid],
                    features: visibleFeatures.filter(
                        (f) => assignments[f.id]?.horizon === pid,
                    ),
                }));
                const unphased = visibleFeatures.filter(
                    (f) => !assignments[f.id],
                );
                if (unphased.length > 0)
                    columns.push({
                        horizon: { id: "_unphased", label: "No Horizon" },
                        features: unphased,
                    });

                return html`
                    <${MasterNav}
                        graph=${graph}
                        filterUser=${filterUser}
                        filterObjective=${filterObjective}
                        onFilter=${handleFilter}
                        onRefresh=${loadGraph}
                        onAdd=${() =>
                            setModal({ type: "add-child", parentId: null })}
                        undoCount=${undoCount}
                        onUndo=${handleUndo}
                        onToggleHistory=${() => setShowHistory(!showHistory)}
                    />
                    ${showBanner
                        ? html`<${ValidationBanner}
                              issues=${validationIssues}
                              onDismiss=${() => setShowBanner(false)}
                          />`
                        : null}
                    <div class="kanban">
                        ${columns.map(
                            (col) => html`
                                <${KanbanColumn}
                                    horizon=${col.horizon}
                                    features=${col.features}
                                    graph=${graph}
                                    selectedId=${selectedId}
                                    onSelect=${setSelectedId}
                                    onDrop=${handleDrop}
                                />
                            `,
                        )}
                    </div>
                    ${selectedId
                        ? html`<${Sidecard}
                              featureId=${selectedId}
                              graph=${graph}
                              onClose=${() => setSelectedId(null)}
                              onMutate=${handleMutate}
                              onShowModal=${(type, parentId) =>
                                  setModal({ type, parentId })}
                          />`
                        : null}
                    ${modal?.type === "add-child"
                        ? html`<${AddEntityModal}
                              graph=${graph}
                              parentId=${modal.parentId}
                              onClose=${() => setModal(null)}
                              onMutate=${handleMutate}
                          />`
                        : null}
                    ${modal?.type === "link"
                        ? html`<${LinkModal}
                              graph=${graph}
                              parentId=${modal.parentId}
                              onClose=${() => setModal(null)}
                              onMutate=${handleMutate}
                          />`
                        : null}
                    ${showHistory
                        ? html`<${HistoryPanel}
                              onClose=${() => setShowHistory(false)}
                          />`
                        : null}
                    ${showChat
                        ? html`<${ChatPanel}
                              onClose=${() => setShowChat(false)}
                          />`
                        : html`<button
                              class="chat-toggle"
                              onClick=${() => setShowChat(true)}
                              title="AI Chat"
                          >
                              ◈
                          </button>`}
                    <${Toast}
                        toast=${toast}
                        onDismiss=${() => setToast(null)}
                    />
                `;
            }

            render(html`<${App} />`, document.getElementById("app"));
        </script>
    </body>
</html>
